<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Expense Tracker</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Expenses</a>
            <a href="#">Reports</a>
        </nav>
    </header>


    <main>

        <section class="hero">
            <h1>Manage Your Daily Expenses</h1>
            <p>Track spending, monitor expenses, and stay financially organized.</p>
        </section>


        <section class="expense-container">

            <div class="card form-card">
                <h2>Add Expense</h2>

                <form id="expenseForm">

                    <label>Expense Name</label>
                    <input type="text" id="name" placeholder="e.g. Food" required>

                    <label>Amount (Rs)</label>
                    <input type="number" id="amount" placeholder="Enter amount" required>

                    <label>Description</label>
                    <textarea id="description" placeholder="Optional description"></textarea>

                    <label>Date</label>
                    <input type="date" id="expense_date" required>

                    <button type="submit">Add Expense</button>
                </form>
            </div>


            <div class="card total-card">
                <h2>Total Expenses</h2>
                <p id="total">Rs 0</p>
            </div>


            <div class="card table-card">
                <h2>Expense History</h2>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Amount</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="expenseTable">

                    </tbody>
                </table>
            </div>

        </section>

    </main>


    <footer>
        <p>© 2026 Expense Tracker | Full Stack Project</p>
    </footer>


    <script src="script.js"></script>
</body>
</html>
